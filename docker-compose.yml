version: "3.9"

services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: openworld
      POSTGRES_PASSWORD: openworld
      POSTGRES_DB: openworld
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openworld"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://openworld:openworld@db:5432/openworld
      PORT: 3000
    volumes:
      - ./sessions:/app/sessions
      - claude_config:/root/.claude
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  claude_config:
